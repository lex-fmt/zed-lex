name: Zed Extension CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# CI invokes scripts/test-all — the same script the pre-commit hook
# runs. Keeping CI thin (just installing prerequisites) means there is
# only one place to add or change a check, and the failure mode is the
# same locally and remotely.

jobs:
  test:
    name: scripts/test-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: zed-lex-wasm

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      # Python 3 ships on ubuntu-latest with tomllib (3.11+).

      - name: scripts/test-all
        run: ./scripts/test-all
